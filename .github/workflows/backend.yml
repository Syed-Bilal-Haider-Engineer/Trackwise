name: Backend CI/CD

on:
  push:
    paths:
      - "backend/**"

jobs:
  build-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: npm install
      - run: npm test

  deploy:
    needs: build-test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v3

      - run: docker build -t trackwise-backend .

      - run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - run: |
          docker tag trackwise-backend ${{ secrets.DOCKER_USERNAME }}/trackwise-backend
          docker push ${{ secrets.DOCKER_USERNAME }}/trackwise-backend