version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trackwise-api
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - PORT=4000
      - JWT_SECRET=${JWT_SECRET:-supersecretkey}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MONGO_URI=${MONGO_URI}
    volumes:
      - backend-data:/app/data
    networks:
      - trackwise-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:4000
    container_name: trackwise-web
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - trackwise-net
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: trackwise-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - trackwise-net
    restart: unless-stopped

volumes:
  backend-data:

networks:
  trackwise-net:
    driver: bridge
